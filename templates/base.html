<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>test</title>
</head>
<body>
<h1>Products</h1>

<ul>
    {% for product in products %}
        <li>
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p>Price: {{ product.price }}</p>
            <p>Quantity: {{ product.quantity }}</p>
            <small>{{ product.created_at }}</small>
        </li>
    {% endfor %}
</ul>
</body>
</html>
